runtime:
  collector: "titan" # titan | qiutan

titan:
  base_url: "https://m.titan007.com"
  timeout_seconds: 20
  score_type: 0
  language: 0
  scan_window_minutes: 90
  max_matches_per_round: 0 # 0 = no limit
  oddsid_ttl_seconds: 21600
  bet365_line_num_prefer: 4
  cookie: ""

qiutan:
  base_url: "https://www.qiutan.com"
  match_list_page: "https://www.qiutan.com/index"
  match_page_template: "https://www.qiutan.com/match/{match_id}"
  # Fill these after running discover mode:
  # python -m src.collectors.qiutan discover "https://www.qiutan.com/match/<ID>"
  match_list_pattern: ""
  odds_history_pattern: ""
  live_score_pattern: ""
  headless: true
  scan_window_minutes: 90
  page_timeout_ms: 15000

scanner:
  min_line_depth: 1.0
  late_upgrade_window_minutes: 15
  bookmaker: "bet365"

alert:
  mode: "log" # log | telegram
  telegram_token: ""
  telegram_chat_id: ""

output:
  enabled: true
  csv_path: "outputs/match_signals.csv"
  dedupe_keys: ["stage", "match_id"]

db:
  path: "bettips.db"
